name: Main Build

on:
    push:
        branches: ["main"]

jobs:
    lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt -r requirements-dev.txt
            - run: ruff check .

    test:
        runs-on: ubuntu-latest
        needs: [lint]
        defaults:
            run:
                working-directory: app
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt -r requirements-dev.txt
            - run: pytest -q

    docker-build:
        runs-on: ubuntu-latest
        needs: [test]
        steps:
            - uses: actions/checkout@v4
            - name: Build + tag with commit SHA
              run: |
                  IMAGE=ops-lab
                  SHA_TAG=${{ github.sha }}
                  docker build -t $IMAGE:$SHA_TAG .
                  # optional:
                  # docker tag $IMAGE:$SHA_TAG $IMAGE:latest
