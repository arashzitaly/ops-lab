name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  APP_DIR: "app"
  IMAGE_NAME: "ops-lab"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ${{ env.APP_DIR }}/requirements.txt
            ${{ env.APP_DIR }}/requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r ${{ env.APP_DIR }}/requirements.txt
          if [ -f "${{ env.APP_DIR }}/requirements-dev.txt" ]; then pip install -r ${{ env.APP_DIR }}/requirements-dev.txt; fi

      - name: Ruff check
        run: ruff check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            ${{ env.APP_DIR }}/requirements.txt
            ${{ env.APP_DIR }}/requirements-dev.txt

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r ${{ env.APP_DIR }}/requirements.txt
          if [ -f "${{ env.APP_DIR }}/requirements-dev.txt" ]; then pip install -r ${{ env.APP_DIR }}/requirements-dev.txt; fi

      - name: Run tests
        run: pytest -q

  docker-build:
    name: Docker build (all branches) + tag on main
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build on every push/PR to keep Dockerfile always valid
      - name: Docker build
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # Optional convenience tag only on main push
      - name: Tag latest (main only)
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: List images (evidence)
        run: docker images | head -n 20